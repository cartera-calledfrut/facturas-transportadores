<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Subir Factura</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .logo p { font-size: 14px; color: #666; margin-top: 4px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    input[type="file"] { display: none; }

    .photo-area {
      border: 2px dashed #c7d2fe;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #f8f7ff;
      margin-bottom: 12px;
      transition: background 0.2s;
    }

    .photo-area:hover { background: #eef2ff; }
    .photo-area .icon { font-size: 36px; margin-bottom: 6px; }
    .photo-area p { font-size: 14px; color: #6366f1; font-weight: 500; }
    .photo-area small { display: block; font-size: 12px; color: #999; margin-top: 3px; }

    .photos-list { margin-bottom: 16px; }

    .photo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .photo-item img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .photo-item-info { flex: 1; min-width: 0; }
    .photo-item-name { font-size: 13px; font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .photo-item-size { font-size: 11px; color: #888; margin-top: 2px; }
    .photo-item-status { font-size: 18px; flex-shrink: 0; }

    .btn-add-photo {
      width: 100%;
      padding: 12px;
      background: #eef2ff;
      color: #4f46e5;
      border: 2px dashed #c7d2fe;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
    }

    .btn-add-photo:hover { background: #e0e7ff; }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button[type="submit"]:hover { background: #4338ca; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none;
      line-height: 1.5;
    }

    .status.loading { background: #eff6ff; color: #3b82f6; display: block; }
    .status.success { background: #f0fdf4; color: #16a34a; display: block; font-size: 15px; }
    .status.error { background: #fef2f2; color: #dc2626; display: block; }

    .success-card {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }

    .success-card .check { font-size: 56px; margin-bottom: 12px; }
    .success-card h2 { font-size: 20px; font-weight: 700; color: #16a34a; margin-bottom: 6px; }
    .success-card p { font-size: 14px; color: #666; margin-bottom: 20px; }

    .btn-nueva {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .progress-bar-wrap {
      background: #e2e8f0;
      border-radius: 99px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: #4f46e5;
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>📄 Subir Factura</h1>
    <p>Foto con sello de recibido</p>
  </div>

  <div id="form-view">
    <form id="form">
      <label for="invoice">Número de factura</label>
      <input type="text" id="invoice" placeholder="Ej: 14283" required autocomplete="off">

      <label>Fotos de la factura</label>
      <div class="photo-area" id="photo-area" onclick="triggerFileInput()">
        <div class="icon">📷</div>
        <p>Tomar foto o seleccionar imagen</p>
        <small>Se comprimirá automáticamente</small>
      </div>

      <input type="file" id="file-input" accept="image/*" capture="environment">

      <div class="photos-list" id="photos-list"></div>

      <button type="button" class="btn-add-photo" id="btn-add-photo" style="display:none" onclick="triggerFileInput()">
        + Agregar otra foto
      </button>

      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="status" id="status"></div>

      <button type="submit" id="submit-btn" disabled style="margin-top:16px">Subir factura</button>
    </form>
  </div>

  <div class="success-card" id="success-card">
    <div class="check">✅</div>
    <h2 id="success-title">¡Factura subida!</h2>
    <p id="success-desc"></p>
    <button class="btn-nueva" onclick="resetAll()">Subir otra factura</button>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQ2o0f1GlBFnjfIsr72nO1wjZXYVCccNlO650jlizg2prS_JKprj7u4O61YMGx-ZjU/exec';

  const fileInput    = document.getElementById('file-input');
  const photoArea    = document.getElementById('photo-area');
  const photosList   = document.getElementById('photos-list');
  const btnAddPhoto  = document.getElementById('btn-add-photo');
  const submitBtn    = document.getElementById('submit-btn');
  const status       = document.getElementById('status');
  const canvas       = document.getElementById('canvas');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar');

  let photos = [];

  function triggerFileInput() {
    fileInput.value = '';
    fileInput.click();
  }

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      showStatus('error', '❌ El archivo debe ser una imagen (JPG, PNG, etc.)');
      return;
    }

    if (file.size > 20 * 1024 * 1024) {
      showStatus('error', '❌ La imagen es demasiado grande (máx. 20MB). Toma la foto con menor resolución.');
      return;
    }

    showStatus('loading', 'Comprimiendo imagen...');

    try {
      const base64 = await compressImage(file);
      const sizeKB = Math.round((base64.length * 0.75) / 1024);
      const originalKB = Math.round(file.size / 1024);

      photos.push({ base64, sizeKB, originalKB });
      renderPhotosList();
      hideStatus();

      photoArea.style.display = 'none';
      btnAddPhoto.style.display = 'block';
      submitBtn.disabled = false;
    } catch (err) {
      showStatus('error', '❌ No se pudo procesar la imagen. Intenta con otra foto.');
    }
  });

  function renderPhotosList() {
    photosList.innerHTML = '';
    photos.forEach((p, i) => {
      const label = photos.length > 1 ? `Foto ${i + 1}` : 'Foto';
      const div = document.createElement('div');
      div.className = 'photo-item';
      div.innerHTML = `
        <img src="${p.base64}" alt="foto ${i+1}">
        <div class="photo-item-info">
          <div class="photo-item-name">${label}</div>
          <div class="photo-item-size">${p.originalKB} KB → ${p.sizeKB} KB comprimida</div>
        </div>
        <span class="photo-item-status" id="status-${i}">🕐</span>
      `;
      photosList.appendChild(div);
    });
  }

  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1600;
          let { width, height } = img;
          if (width > MAX || height > MAX) {
            const ratio = Math.min(MAX / width, MAX / height);
            width  = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const invoice = document.getElementById('invoice').value.trim();

    if (!invoice) {
      showStatus('error', '❌ Escribe el número de factura.');
      return;
    }

    if (photos.length === 0) {
      showStatus('error', '❌ Agrega al menos una foto.');
      return;
    }

    submitBtn.disabled = true;
    btnAddPhoto.style.display = 'none';
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';
    hideStatus();

    let uploaded = 0;
    let failed = 0;

    for (let i = 0; i < photos.length; i++) {
      const suffix = photos.length > 1 ? `-${i + 1}` : '';
      const filename = invoice + suffix;
      const statusEl = document.getElementById(`status-${i}`);

      showStatus('loading', `Subiendo foto ${i + 1} de ${photos.length}...`);

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ filename, image: photos[i].base64 })
        });
        statusEl.textContent = '✅';
        uploaded++;
      } catch (err) {
        statusEl.textContent = '❌';
        failed++;
      }

      progressBar.style.width = `${((i + 1) / photos.length) * 100}%`;
    }

    progressWrap.style.display = 'none';

    if (failed === 0) {
      const desc = photos.length > 1
        ? `${photos.length} fotos subidas como ${invoice}-1.jpg, ${invoice}-2.jpg, etc.`
        : `Guardada como ${invoice}.jpg en tu carpeta de Drive.`;

      document.getElementById('success-title').textContent = `¡Factura ${invoice} subida!`;
      document.getElementById('success-desc').textContent = desc;
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-card').style.display = 'block';
    } else {
      showStatus('error', `❌ ${failed} foto(s) no se pudieron subir. Verifica tu conexión e intenta de nuevo.`);
      submitBtn.disabled = false;
      btnAddPhoto.style.display = 'block';
    }
  });

  function resetAll() {
    photos = [];
    document.getElementById('invoice').value = '';
    fileInput.value = '';
    photosList.innerHTML = '';
    photoArea.style.display = 'block';
    btnAddPhoto.style.display = 'none';
    submitBtn.disabled = true;
    hideStatus();
    progressBar.style.width = '0%';
    document.getElementById('form-view').style.display = 'block';
    document.getElementById('success-card').style.display = 'none';
  }

  function showStatus(type, message) {
    status.className = 'status ' + type;
    status.textContent = message;
  }

  function hideStatus() {
    status.className = 'status';
    status.style.display = 'none';
  }
</script>

</body>
</html>
